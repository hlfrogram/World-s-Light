<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세계의 빛 - 로그인</title>
    <style>
        :root {
            --void: #0a0d12;
            --panel: #121820;
            --panel-2: #0d1319;
            --line: #24313d;
            --cyan: #3ddfef;
            --cyan-dim: #1f6a75;
            --amber: #e8a23d;
            --ink: #dfe6ec;
            --dim: #6b7785;
            --danger: #ff4d5e;
            --success: #4caf50;
            --mono: ui-monospace, Consolas, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--void);
            color: var(--ink);
            font-family: var(--mono);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-container {
            background-color: var(--panel);
            border: 1px solid var(--line);
            border-radius: 0;
            padding: 0 0 34px;
            max-width: 400px;
            width: 100%;
            position: relative;
        }

        .auth-titlebar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 14px;
            background-color: var(--panel-2);
            border-bottom: 1px solid var(--line);
            font-size: 10.5px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--dim);
            margin-bottom: 30px;
        }

        .auth-titlebar .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--cyan);
            box-shadow: 0 0 6px var(--cyan);
        }

        .auth-body {
            padding: 0 36px;
        }

        .auth-container h1 {
            text-align: center;
            color: var(--amber);
            margin-bottom: 8px;
            font-size: 30px;
            letter-spacing: 0.06em;
            text-shadow: 0 0 14px rgba(232, 162, 61, 0.3);
        }

        .auth-container p {
            text-align: center;
            color: var(--dim);
            margin-bottom: 30px;
            font-size: 12px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            color: var(--cyan);
            font-size: 11px;
            letter-spacing: 0.06em;
            font-weight: bold;
        }

        .form-group input {
            background-color: var(--panel-2);
            border: 1px solid var(--line);
            color: var(--ink);
            padding: 10px 12px;
            border-radius: 0;
            font-family: var(--mono);
            font-size: 13px;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--cyan);
            box-shadow: 0 0 8px rgba(61, 223, 239, 0.2);
        }

        .btn {
            background-color: var(--amber);
            color: #12100a;
            border: none;
            padding: 10px;
            border-radius: 0;
            font-weight: bold;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--mono);
            font-size: 13px;
            clip-path: polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
        }

        .btn:hover {
            background-color: #f3b458;
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--cyan);
            border: 1px solid var(--cyan-dim);
            clip-path: none;
        }

        .btn-secondary:hover {
            background-color: rgba(61, 223, 239, 0.08);
            color: var(--cyan);
            border-color: var(--cyan);
        }

        .message {
            padding: 10px;
            border-radius: 0;
            text-align: center;
            font-size: 12px;
            margin-bottom: 15px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .error-message {
            background-color: rgba(255, 77, 94, 0.12);
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .success-message {
            background-color: rgba(76, 175, 80, 0.12);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .toggle-form {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: var(--dim);
        }

        .toggle-form button {
            background: none;
            border: none;
            color: var(--cyan);
            cursor: pointer;
            text-decoration: underline;
            font-family: var(--mono);
            font-size: 12px;
            transition: color 0.2s;
        }

        .toggle-form button:hover {
            color: #8ff0fb;
        }

        .loading {
            display: none;
            text-align: center;
            font-size: 12px;
            color: var(--dim);
        }

        .loading.show {
            display: block;
        }

        @media (max-width: 480px) {
            .auth-body {
                padding: 0 22px;
            }

            .auth-container h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-titlebar"><span class="dot"></span> world-of-light.sys / login</div>
        <div class="auth-body">
        <h1>세계의 빛</h1>
        <p>게임에 접속하세요</p>

        <div id="errorMessage" class="message error-message"></div>
        <div id="successMessage" class="message success-message"></div>
        <div class="loading" id="loading">로딩 중...</div>

        <!-- 로그인 폼 -->
        <form id="loginForm" class="auth-form" style="display: block;">
            <div class="form-group">
                <label for="loginId">아이디</label>
                <input type="text" id="loginId" placeholder="영문/숫자/밑줄 3~20자" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">비밀번호</label>
                <input type="password" id="loginPassword" placeholder="8자 이상" required>
            </div>
            <button type="submit" class="btn">로그인</button>
        </form>

        <!-- 회원가입 폼 -->
        <form id="signupForm" class="auth-form" style="display: none;">
            <div class="form-group">
                <label for="signupId">아이디 (캐릭터 이름)</label>
                <input type="text" id="signupId" placeholder="영문/숫자/밑줄 3~20자" required>
            </div>
            <div class="form-group">
                <label for="signupEmail">이메일</label>
                <input type="email" id="signupEmail" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
                <label for="signupPassword">비밀번호</label>
                <input type="password" id="signupPassword" placeholder="8자 이상" required>
            </div>
            <div class="form-group">
                <label for="signupPasswordConfirm">비밀번호 확인</label>
                <input type="password" id="signupPasswordConfirm" placeholder="비밀번호 확인" required>
            </div>
            <button type="submit" class="btn">회원가입</button>
        </form>

        <div class="toggle-form">
            <span id="toggleText">계정이 없으신가요? </span>
            <button type="button" id="toggleBtn">회원가입</button>
        </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ===== 헬퍼: 매번 새로 조회해서 항상 현재 DOM의 요소를 참조 =====
        function $(id) { return document.getElementById(id); }

        function showError(message) {
            $('errorMessage').textContent = message;
            $('errorMessage').classList.add('show');
        }
        function showSuccess(message) {
            $('successMessage').textContent = message;
            $('successMessage').classList.add('show');
        }
        function clearMessages() {
            $('errorMessage').classList.remove('show');
            $('successMessage').classList.remove('show');
        }

        function showSignupForm() {
            $('loginForm').style.display = 'none';
            $('signupForm').style.display = 'flex';
            $('toggleText').textContent = '이미 계정이 있으신가요? ';
            $('toggleBtn').textContent = '로그인';
        }
        function showLoginForm() {
            $('loginForm').style.display = 'flex';
            $('signupForm').style.display = 'none';
            $('toggleText').textContent = '계정이 없으신가요? ';
            $('toggleBtn').textContent = '회원가입';
        }

        // ===== 이벤트 위임: 폼이 재생성되어도(자동완성/확장 프로그램 등) 항상 동작 =====
        document.addEventListener('click', (e) => {
            if (e.target && e.target.id === 'toggleBtn') {
                const isLoginVisible = $('loginForm').style.display !== 'none';
                if (isLoginVisible) showSignupForm(); else showLoginForm();
            }
        }, true);

        // ===== 아이디(캐릭터 이름) 형식 검사 =====
        const ID_PATTERN = /^[a-zA-Z0-9_]{3,20}$/;

        // ===== Supabase 초기화 =====
        const SUPABASE_URL = 'https://ptukyozancuplzwvvqma.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_dAhPMLcB0zEQW3QaSB3S_Q_PwSdj3__';
        let sbClient = null;
        try {
            if (!window.supabase) throw new Error('Supabase 라이브러리를 불러오지 못했습니다.');
            sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (err) {
            showError('서버 연결에 실패했습니다. 새로고침 후 다시 시도해주세요. (' + err.message + ')');
        }

        document.addEventListener('submit', async (e) => {
            if (e.target && e.target.id === 'loginForm') {
                e.preventDefault();
                clearMessages();
                if (!sbClient) { showError('서버 연결에 실패했습니다. 새로고침 후 다시 시도해주세요.'); return; }

                const id = $('loginId').value.trim();
                const password = $('loginPassword').value;

                $('loading').classList.add('show');

                const { data: profile, error: lookupError } = await sbClient
                    .from('profiles')
                    .select('email')
                    .eq('username', id)
                    .single();

                if (lookupError || !profile) {
                    $('loading').classList.remove('show');
                    showError('아이디를 찾을 수 없습니다');
                    return;
                }

                const { data, error } = await sbClient.auth.signInWithPassword({ email: profile.email, password });

                $('loading').classList.remove('show');

                if (error) {
                    showError('로그인 실패: 아이디 또는 비밀번호를 확인해주세요');
                } else if (data.user) {
                    showSuccess('로그인 성공! 게임으로 이동합니다...');
                    setTimeout(() => { window.location.href = 'game.html'; }, 1500);
                }
            } else if (e.target && e.target.id === 'signupForm') {
                e.preventDefault();
                clearMessages();
                if (!sbClient) { showError('서버 연결에 실패했습니다. 새로고침 후 다시 시도해주세요.'); return; }

                const id = $('signupId').value.trim();
                const email = $('signupEmail').value.trim();
                const password = $('signupPassword').value;
                const confirmPassword = $('signupPasswordConfirm').value;

                if (!ID_PATTERN.test(id)) { showError('아이디는 영문/숫자/밑줄 3~20자여야 합니다'); return; }
                if (password !== confirmPassword) { showError('비밀번호가 일치하지 않습니다'); return; }
                if (password.length < 8) { showError('비밀번호는 8자 이상이어야 합니다'); return; }

                $('loading').classList.add('show');

                const { data: existing } = await sbClient.from('profiles').select('username').eq('username', id).maybeSingle();
                if (existing) {
                    $('loading').classList.remove('show');
                    showError('이미 사용 중인 아이디입니다');
                    return;
                }

                const { data, error } = await sbClient.auth.signUp({
                    email,
                    password,
                    options: { data: { username: id } }
                });

                if (!error && data.user) {
                    const { error: profileError } = await sbClient.from('profiles').insert({ id: data.user.id, username: id, email });
                    if (profileError) {
                        $('loading').classList.remove('show');
                        showError('회원가입 실패: 아이디 등록 중 오류가 발생했습니다 (' + profileError.message + ')');
                        return;
                    }
                }

                $('loading').classList.remove('show');

                if (error) {
                    showError('회원가입 실패: ' + error.message);
                } else if (data.user) {
                    showSuccess('회원가입 성공! 로그인 페이지로 돌아갑니다...');
                    setTimeout(() => {
                        showLoginForm();
                        $('signupId').value = '';
                        $('signupEmail').value = '';
                        $('signupPassword').value = '';
                        $('signupPasswordConfirm').value = '';
                    }, 2000);
                }
            }
        }, true);

        // ===== 자동 로그인 확인 =====
        window.addEventListener('load', async () => {
            if (!sbClient) return;
            const { data: { user } } = await sbClient.auth.getUser();
            if (user) {
                window.location.href = 'game.html';
            }
        });
    </script>
</body>
</html>
